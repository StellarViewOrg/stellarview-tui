name: TUI CI

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/tui/**"
      - "package.json"
      - ".github/workflows/tui-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/tui/**"
      - "package.json"
      - ".github/workflows/tui-ci.yml"

jobs:
  ci:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Test
        run: make test-all
        env:
          GOFLAGS: -race

      - name: Build
        run: make build