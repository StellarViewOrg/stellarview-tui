name: Stellar TUI Release

on:
  push:
    tags:
      - "stellar-tui-v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#stellar-tui-v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build binary
        working-directory: apps/tui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          LDFLAGS="-s -w -X github.com/miguelnietoa/stellar-explorer/tui/internal/config.Version=${VERSION}"
          go build -ldflags "$LDFLAGS" -o "stellar-tui" ./cmd/tui

      - name: Package archive
        working-directory: apps/tui
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          NAME="stellar-tui_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "dist/${NAME}"
          cp stellar-tui "dist/${NAME}/"
          cp README.md config/config.example.json labels.example.toml "dist/${NAME}/"
          tar -czf "dist/${NAME}.tar.gz" -C dist "${NAME}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: apps/tui/dist/*.tar.gz
          generate_release_notes: true