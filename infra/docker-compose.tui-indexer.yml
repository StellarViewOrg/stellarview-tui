services:
  postgres-tui:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "54330:5432"
    environment:
      POSTGRES_DB: stellar_explorer_tui
      POSTGRES_USER: explorer
      POSTGRES_PASSWORD: explorer_dev
    volumes:
      - postgres_tui_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U explorer -d stellar_explorer_tui"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-tui:
    image: redis:7-alpine
    ports:
      - "63890:6379"
    volumes:
      - redis_tui_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  typesense-tui:
    image: typesense/typesense:27.1
    ports:
      - "18118:8108"
    environment:
      TYPESENSE_API_KEY: explorer_dev_key
      TYPESENSE_DATA_DIR: /data
    volumes:
      - typesense_tui_data:/data

volumes:
  postgres_tui_data:
  redis_tui_data:
  typesense_tui_data:
